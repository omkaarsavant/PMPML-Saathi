<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMPML Bus Route Finder</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://apis.mappls.com/advancedmaps/api/cace1f53599a9f886d270af1b2f43248/map_sdk?v=3.0&libraries=search"></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e3050;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #22c55e;
      --purple: #a855f7;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #map-modal {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 2000;
      display: none;
      flex-direction: column
    }

    #map-modal.active {
      display: flex
    }

    #map-header {
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-bottom: 1px solid var(--border)
    }

    #map-canvas {
      flex: 1;
      width: 100%
    }

    .map-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer
    }

    .map-title {
      font-weight: 700;
      letter-spacing: 1px
    }

    .map-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 2001;
      pointer-events: none;
      border: 1px solid var(--accent)
    }

    /* Layout */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 12px 32px;
      position: relative;
      z-index: 1;
    }

    /* Header — compact on mobile */
    header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .bus-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), #0066ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.3);
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(20px, 6vw, 34px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent), #7c3aed, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: "JetBrains Mono", monospace;
    }

    /* Search card */
    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .search-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #7c3aed, var(--accent2));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    /* Mobile: stacked layout with swap button overlapping */
    .search-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
      position: relative;
    }

    .swap-col {
      display: flex;
      justify-content: center;
      margin: -2px 0;
    }

    .swap-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--accent);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
      z-index: 2;
    }

    .swap-btn:active {
      transform: rotate(180deg);
      background: rgba(0, 212, 255, 0.15);
    }

    /* Desktop: side-by-side */
    @media(min-width:600px) {
      .search-grid {
        flex-direction: row;
        align-items: flex-end;
      }

      .search-grid>div:not(.swap-col) {
        flex: 1;
      }

      .swap-col {
        margin: 0;
        align-self: flex-end;
      }

      .swap-btn:hover {
        border-color: var(--accent);
        background: rgba(0, 212, 255, 0.1);
        transform: rotate(180deg);
      }
    }

    .field-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      font-family: "JetBrains Mono", monospace;
      margin-bottom: 5px;
    }

    .field-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .field-dot.p {
      background: var(--success);
      box-shadow: 0 0 5px var(--success);
    }

    .field-dot.d {
      background: var(--accent2);
      box-shadow: 0 0 5px var(--accent2);
    }

    .autocomplete-wrapper {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 40px 13px 14px;
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      font-size: 16px;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    .search-input::placeholder {
      color: var(--muted);
      font-weight: 400;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
      display: none;
    }

    .dropdown.active {
      display: block;
    }

    .dropdown::-webkit-scrollbar {
      width: 3px;
    }

    .dropdown::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .dropdown-item {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(30, 48, 80, 0.5);
      transition: background 0.1s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:active,
    .dropdown-item.kbd-active {
      background: var(--surface2);
    }

    .item-type {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .item-type.bus {
      color: var(--accent);
    }

    .item-type.place {
      color: var(--success);
    }

    .item-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      margin-top: 2px;
    }

    .search-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, var(--accent), #0066ff);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: "Rajdhani", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-appearance: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .search-btn:active {
      opacity: 0.85;
    }

    /* Tabs — full width, large tap targets */
    .tabs {
      display: flex;
      margin-bottom: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: "Rajdhani", sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      line-height: 1.3;
      text-align: center;
    }

    .tab-btn.active {
      background: var(--surface2);
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }

    .tab-btn:active {
      background: var(--surface2);
    }

    /* Stats bar — scrollable row on mobile */
    .stats-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .stats-bar::-webkit-scrollbar {
      display: none;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .stat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .stat-dot.total {
      background: var(--purple);
      box-shadow: 0 0 5px var(--purple);
    }

    .stat-dot.up {
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
    }

    .stat-dot.down {
      background: var(--accent2);
      box-shadow: 0 0 5px var(--accent2);
    }

    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }

    .results-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .route-count {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Filter row — horizontal scroll */
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-appearance: none;
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 255, 0.08);
    }

    .filter-btn:active {
      opacity: 0.7;
    }

    /* Route cards — bigger tap targets */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .route-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
      animation: slideIn 0.2s ease forwards;
    }

    .route-card.dir-down {
      border-left-color: var(--accent2);
    }

    .route-card:active {
      opacity: 0.9;
    }

    .route-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
    }

    .route-badge {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 15px;
      padding: 5px 10px;
      border-radius: 6px;
      flex-shrink: 0;
      background: rgba(0, 212, 255, 0.12);
      color: var(--accent);
      border: 1px solid rgba(0, 212, 255, 0.25);
      min-width: 44px;
      text-align: center;
    }

    .route-card.dir-down .route-badge {
      background: rgba(255, 107, 53, 0.12);
      color: var(--accent2);
      border-color: rgba(255, 107, 53, 0.25);
    }

    .route-info {
      flex: 1;
      min-width: 0;
    }

    .route-long-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .route-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      margin-top: 2px;
    }

    .dir-pill {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      font-family: "JetBrains Mono", monospace;
      flex-shrink: 0;
    }

    .dir-pill.up {
      background: rgba(0, 212, 255, 0.1);
      color: var(--accent);
    }

    .dir-pill.down {
      background: rgba(255, 107, 53, 0.1);
      color: var(--accent2);
    }

    .expand-icon {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.2s;
      flex-shrink: 0;
      padding: 4px;
    }

    .route-card.open .expand-icon {
      transform: rotate(180deg);
    }

    .route-body {
      display: none;
      padding: 0 14px 14px;
    }

    .route-card.open .route-body {
      display: block;
    }

    .schedule-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: "JetBrains Mono", monospace;
      margin-bottom: 6px;
    }

    .schedule-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .schedule-chip {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      color: var(--muted);
    }

    /* Transfer cards */
    .xfer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--purple);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
      animation: slideIn 0.2s ease forwards;
    }

    .xfer-card:active {
      opacity: 0.9;
    }

    .xfer-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 14px;
    }

    .xfer-badges {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .xfer-badge {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(168, 85, 247, 0.12);
      color: var(--purple);
      border: 1px solid rgba(168, 85, 247, 0.25);
    }

    .xfer-arrow {
      color: var(--muted);
      font-size: 12px;
    }

    .xfer-info {
      flex: 1;
      min-width: 0;
    }

    .xfer-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .xfer-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      margin-top: 2px;
    }

    .xfer-pill {
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 10px;
      font-family: "JetBrains Mono", monospace;
      flex-shrink: 0;
      background: rgba(168, 85, 247, 0.1);
      color: var(--purple);
    }

    .xfer-body {
      display: none;
      padding: 0 14px 14px;
    }

    .xfer-card.open .xfer-body {
      display: block;
    }

    .xfer-card.open .expand-icon {
      transform: rotate(180deg);
    }

    .interchange-marker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      padding: 8px 12px;
      background: rgba(168, 85, 247, 0.08);
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--purple);
    }

    .interchange-marker .i-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    /* Stops timeline */
    .stops-timeline {
      position: relative;
      padding-left: 20px;
    }

    .stops-timeline::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(to bottom, var(--success), var(--accent2));
    }

    .stop-item {
      position: relative;
      padding: 5px 0 5px 12px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.3;
    }

    .stop-item::before {
      content: "";
      position: absolute;
      left: -14px;
      top: 50%;
      transform: translateY(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--muted);
    }

    .stop-item.hl-p {
      color: var(--text);
      font-weight: 700;
      font-size: 15px;
    }

    .stop-item.hl-p::before {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 8px var(--success);
      width: 10px;
      height: 10px;
      left: -15px;
    }

    .stop-item.hl-d {
      color: var(--text);
      font-weight: 700;
      font-size: 15px;
    }

    .stop-item.hl-d::before {
      background: var(--accent2);
      border-color: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      width: 10px;
      height: 10px;
      left: -15px;
    }

    .stop-item.hl-x {
      color: var(--purple);
      font-weight: 700;
    }

    .stop-item.hl-x::before {
      background: var(--purple);
      border-color: var(--purple);
      box-shadow: 0 0 8px var(--purple);
      width: 10px;
      height: 10px;
      left: -15px;
    }

    /* Dest groups */
    .dest-group {
      margin-bottom: 16px;
    }

    .dest-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .dest-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .dest-count {
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .empty-sub {
      font-size: 13px;
      line-height: 1.6;
    }

    #results-section {
      display: none;
    }

    #tab-direct,
    #tab-transfer {
      display: none;
    }

    /* Quick Search Box */
    .quick-search-wrapper {
      margin: 0 0 14px;
      position: relative;
      display: none;
    }

    #results-section .quick-search-wrapper {
      display: block;
    }

    .quick-search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px 10px 38px;
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      -webkit-appearance: none;
    }

    .quick-search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    .search-icon-small {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    .btn-group {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 4px;
      align-items: center;
      z-index: 5;
    }

    .loc-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      transition: transform 0.1s;
    }

    .loc-btn:active {
      transform: scale(1.2);
    }

    #map-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 500px;
      height: 500px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      z-index: 1001;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    #map-modal.active {
      display: flex;
    }

    #map-header {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .map-title {
      font-weight: 700;
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .map-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      opacity: 0.7;
    }

    #map-canvas {
      flex: 1;
      width: 100%;
      background: #222;
    }

    .map-hint {
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }

    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
    }

    #modal-overlay.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo-bar">
        <div class="bus-icon">🚌</div>
        <h1>PMPML Route Finder</h1>
      </div>
      <p class="subtitle">1,151 Routes · 4,357 Stops</p>
    </header>

    <div class="search-card">
      <div class="search-grid">
        <div>
          <div class="field-label"><span class="field-dot p"></span>Pickup Stop</div>
          <div class="autocomplete-wrapper">
            <input type="text" id="pickup-input" class="search-input" placeholder="e.g. Shivaji Maharaj Putla"
              autocomplete="off" inputmode="search">
            <div class="btn-group">
              <button class="loc-btn" onclick="handleLocationAction('pickup-input', true)"
                title="Current location / Search">📍</button>
              <button class="loc-btn map-trigger" onclick="openMapPicker('pickup-input', true)"
                title="Pick on Map">🗺️</button>
            </div>
            <div class="dropdown" id="pickup-dropdown"></div>
          </div>
        </div>
        <div class="swap-col">
          <button class="swap-btn" onclick="swapStops()" title="Swap stops">⇅</button>
        </div>
        <div>
          <div class="field-label"><span class="field-dot d"></span>Drop Stop</div>
          <div class="autocomplete-wrapper">
            <input type="text" id="drop-input" class="search-input" placeholder="e.g. Karve Nagar" autocomplete="off"
              inputmode="search">
            <div class="btn-group">
              <button class="loc-btn" onclick="handleLocationAction('drop-input', false)"
                title="Current location / Search">📍</button>
              <button class="loc-btn map-trigger" onclick="openMapPicker('drop-input', false)"
                title="Pick on Map">🗺️</button>
            </div>
            <div class="dropdown" id="drop-dropdown"></div>
          </div>
        </div>
      </div>
      <button class="search-btn" onclick="searchRoutes()">🔍 &nbsp;Find Routes</button>
    </div>

    <!-- Map Picker Modal -->
    <div id="map-modal">
      <div id="map-header">
        <div class="map-title">SELECT LOCATION</div>
        <button class="map-close" onclick="closeMapPicker()">✕</button>
      </div>
      <div id="map-canvas"></div>
      <div class="map-hint">Tap on map to select nearest bus stop</div>
    </div>
    <div id="modal-overlay" onclick="closeMapPicker()"></div>

    <div id="results-section">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="tabs" id="tabs">
        <button class="tab-btn active" id="tab-direct-btn" onclick="switchTab('direct')">🚌 Direct Routes <span
            id="direct-count"></span></button>
        <button class="tab-btn" id="tab-transfer-btn" onclick="switchTab('transfer')">🔄 With 1 Change <span
            id="transfer-count"></span></button>
      </div>
      <div class="results-header">
        <div class="results-title" id="results-title"></div>
        <div class="route-count" id="route-count"></div>
      </div>
      <div class="filter-row" id="filter-row"></div>

      <div class="quick-search-wrapper">
        <span class="search-icon-small">🔍</span>
        <input type="text" id="quick-bus-search" class="quick-search-input"
          placeholder="Quick search bus number (e.g. 207)..." oninput="onQuickSearch(this.value)">
      </div>

      <div id="results-list"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    let map = null, mapMarker = null;
    let currentMapInputId = null;
    let currentMapIsPickup = false;

    function openMapPicker(inputId, isPickup) {
      currentMapInputId = inputId;
      currentMapIsPickup = isPickup;
      document.getElementById('map-modal').classList.add('active');
      document.getElementById('modal-overlay').classList.add('active');

      setTimeout(() => {
        if (!map) {
          const mpps = window.mappls || window.MapmyIndia;
          if (!mpps) {
            alert("Mappls SDK failed to load. Please check your internet connection or API key.");
            return;
          }
          map = new mpps.Map('map-canvas', {
            center: [18.5204, 73.8567],
            zoom: 13,
            clickableIcons: false
          });

          map.on('click', (e) => {
            const lat = e.lngLat.lat;
            const lng = e.lngLat.lng;
            if (mapMarker) {
              mapMarker.setLngLat([lng, lat]);
            } else {
              mapMarker = new mpps.Marker({
                map: map,
                position: { lat: lat, lng: lng }
              });
            }
            selectNearestStopFromCoords(lat, lng);
          });
        }
      }, 100);
    }

    function closeMapPicker() {
      document.getElementById('map-modal').classList.remove('active');
      document.getElementById('modal-overlay').classList.remove('active');
    }

    function selectNearestStopFromCoords(lat, lon) {
      let minDistance = Infinity, nearest = null;
      for (const stopName in STOP_COORDS) {
        const coords = STOP_COORDS[stopName];
        const dist = haversine(lat, lon, coords.lat, coords.lon);
        if (dist < minDistance) { minDistance = dist; nearest = stopName; }
      }

      if (nearest && minDistance < 2) {
        const stopObj = STOPS.find(s => s.n.toLowerCase() === nearest);
        const input = document.getElementById(currentMapInputId);
        input.value = stopObj.n;
        if (currentMapIsPickup) pickupStop = stopObj; else dropStop = stopObj;

        setTimeout(closeMapPicker, 400);
      } else {
        const hint = document.querySelector('.map-hint');
        const originalHint = hint.textContent;
        hint.textContent = "No PMPML stop within 2km of this point.";
        hint.style.color = "var(--accent2)";
        setTimeout(() => {
          hint.textContent = originalHint;
          hint.style.color = "";
        }, 2000);
      }
    }

    // Build stop->index lookup per route for fast transfer search
    const ROUTE_STOP_IDX = {};
    for (const rid of Object.keys(ROUTES)) {
      const idx = {};
      ROUTES[rid].s.forEach((s, i) => { idx[s.n.toLowerCase()] = i; });
      ROUTE_STOP_IDX[rid] = idx;
    }

    let pickupStop = null, dropStop = null;
    let allDirect = [], allTransfers = [];
    let currentTab = 'direct';

    // ── Autocomplete ──────────────────────────────────────────────────────────────
    let debounceTimers = {};

    function setupAutocomplete(inputId, dropdownId, isPickup) {
      const input = document.getElementById(inputId);
      const dd = document.getElementById(dropdownId);
      let kbdIdx = -1;

      input.addEventListener('input', async () => {
        const q = input.value.trim().toLowerCase();
        kbdIdx = -1;
        if (q.length < 2) { dd.classList.remove('active'); return; }

        // 1. Local Bus Stop Matches (Instant)
        const localMatches = STOPS.filter(s => s.n.toLowerCase().includes(q)).slice(0, 8)
          .map(s => ({ n: s.n, meta: `${s.r.length} routes`, type: 'bus', original: s }));

        renderDropdown(localMatches, q);

        // 2. Remote Place Matches (Google Places)
        clearTimeout(debounceTimers[inputId]);
        if (q.length >= 3) {
          debounceTimers[inputId] = setTimeout(async () => {
            try {
              const predictions = await fetchPlaces(q);
              if (input.value.trim().toLowerCase() !== q) return; // Stale query

              const placeMatches = predictions.map(p => ({
                n: p.structured_formatting.main_text,
                meta: p.structured_formatting.secondary_text,
                type: 'place',
                place_id: p.place_id
              }));

              // Merge: Locals first, then unique places
              const combined = [...localMatches];
              placeMatches.forEach(pm => {
                if (!combined.some(c => c.n.toLowerCase() === pm.n.toLowerCase())) combined.push(pm);
              });

              renderDropdown(combined.slice(0, 15), q);
            } catch (err) { console.error("Place fetch failed", err); }
          }, 300);
        }
      });

      function renderDropdown(matches, q) {
        if (!matches.length) { dd.classList.remove('active'); return; }
        dd._matches = matches;
        dd.innerHTML = matches.map((m, i) => `
      <div class="dropdown-item" data-idx="${i}" onmousedown="selectResult(event,'${inputId}','${dropdownId}',${isPickup})">
        <div class="item-type ${m.type}">${m.type === 'bus' ? '🚌 Bus Stop' : '📍 Place'}</div>
        <div class="item-name">${hl(m.n, q)}</div>
        <div class="item-meta">${m.meta}</div>
      </div>`).join('');
        dd.classList.add('active');
      }

      input.addEventListener('keydown', e => {
        const items = dd.querySelectorAll('.dropdown-item');
        if (!items.length) { if (e.key === 'Enter') searchRoutes(); return; }
        if (e.key === 'ArrowDown') { kbdIdx = Math.min(kbdIdx + 1, items.length - 1); markActive(items, kbdIdx); e.preventDefault(); }
        else if (e.key === 'ArrowUp') { kbdIdx = Math.max(kbdIdx - 1, 0); markActive(items, kbdIdx); e.preventDefault(); }
        else if (e.key === 'Enter') { if (kbdIdx >= 0 && dd._matches) doSelect(dd._matches[kbdIdx], inputId, dropdownId, isPickup); else searchRoutes(); }
        else if (e.key === 'Escape') dd.classList.remove('active');
      });
      input.addEventListener('blur', () => setTimeout(() => dd.classList.remove('active'), 200));
    }

    let mapplsToken = "";
    async function getMapplsToken() {
      if (mapplsToken) return mapplsToken;
      const cid = "96dHZVzsAusPDhj5jOT0V3gke-FDI7DFv8aNOIVs_OfHPvG7rHNLTy4Z-KdHgcE8f4ycbwCpaJMsR4krRAAa0g==";
      const csec = "lrFxI-iSEg8whGpYKLF-XoffVwtDaXnIxFOHsa9kbBCJrHJ84oZbQ_ehRZgnJUgZv6tM9UJvpwaiv3Xa1rEIxv0r-k8EmtW4";
      try {
        const res = await fetch(`https://outpost.mappls.com/api/security/oauth/token?grant_type=client_credentials&client_id=${cid}&client_secret=${csec}`, { method: 'POST' });
        if (!res.ok) throw new Error("Auth failed");
        const data = await res.json();
        mapplsToken = data.access_token;
        console.log("Mappls: Successfully authenticated.");
        return mapplsToken;
      } catch (e) {
        console.warn("Mappls: Auth failed (possibly CORS or Whitelisting). Falling back to static key.");
        return "cace1f53599a9f886d270af1b2f43248";
      }
    }

    async function fetchPlaces(q) {
      // 1. Try Mappls JS SDK Plugin first (Best for browser/CORS)
      const mpps = window.mappls || window.MapmyIndia;
      if (mpps && typeof mpps.search === 'function') {
        try {
          return new Promise((resolve) => {
            mpps.search(q, { location: [18.5204, 73.8567], region: 'ind', bridge: true, hyperLocal: true }, (data) => {
              if (data && data.suggestedLocations) {
                resolve(data.suggestedLocations.map(loc => ({
                  n: loc.placeName,
                  meta: loc.placeAddress,
                  type: 'place',
                  eLoc: loc.eLoc,
                  lat: loc.latitude,
                  lon: loc.longitude
                })));
              } else resolve(null); // Fallback to next tier
            });
            setTimeout(() => resolve(null), 2000); // Timeout to next tier
          }).then(res => res || restSearch(q));
        } catch (e) { console.warn("SDK Search failed, trying REST..."); }
      }
      return await restSearch(q);
    }

    async function restSearch(q) {
      const token = await getMapplsToken();
      try {
        const url = `https://search.mappls.com/search/places/autosuggest/json?query=${encodeURIComponent(q)}&location=18.5204,73.8567&bridge&hyperLocal&access_token=${token}`;
        const res = await fetch(url);
        if (res.status === 401 || res.status === 403) throw new Error("Unauthorized");
        const data = await res.json();
        if (data && data.suggestedLocations) {
          return data.suggestedLocations.map(loc => ({
            n: loc.placeName,
            meta: loc.placeAddress,
            type: 'place',
            eLoc: loc.eLoc,
            lat: loc.latitude,
            lon: loc.longitude
          }));
        }
      } catch (err) {
        console.log("Mappls REST failed, using OSM.");
      }
      return await osmSearch(q);
    }

    async function osmSearch(q) {
      const query = q.includes("pune") ? q : (q + " Pune");
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
        const data = await res.json();
        return data.map(loc => ({
          n: loc.display_name.split(',')[0],
          meta: loc.display_name,
          type: 'place',
          lat: loc.lat,
          lon: loc.lon
        }));
      } catch (e) { return []; }
    }

    function markActive(items, idx) { items.forEach((el, i) => el.classList.toggle('kbd-active', i === idx)); }

    function selectResult(e, inputId, dropdownId, isPickup) {
      e.preventDefault();
      const dd = document.getElementById(dropdownId);
      const match = dd._matches[parseInt(e.currentTarget.dataset.idx)];
      doSelect(match, inputId, dropdownId, isPickup);
    }

    async function doSelect(match, inputId, dropdownId, isPickup) {
      const input = document.getElementById(inputId);
      document.getElementById(dropdownId).classList.remove('active');

      if (match.type === 'bus') {
        input.value = match.n;
        if (isPickup) pickupStop = match.original; else dropStop = match.original;
      } else {
        input.value = match.n;
        const originalPlaceholder = input.placeholder;
        input.placeholder = "Resolving to nearest stop...";
        
        const lat = match.lat || match.latitude;
        const lon = match.lon || match.longitude;

        if (lat && lon) {
          resolveNearest(lat, lon, input, isPickup, originalPlaceholder);
        } else if (match.eLoc) {
          const token = await getMapplsToken();
          try {
            const res = await fetch(`https://explore.mappls.com/apis/O2O/entity/${match.eLoc}?access_token=${token}`);
            const data = await res.json();
            if (data && data.results && data.results[0]) {
              resolveNearest(data.results[0].latitude, data.results[0].longitude, input, isPickup, originalPlaceholder);
            } else {
              input.placeholder = originalPlaceholder;
            }
          } catch (e) {
            input.placeholder = originalPlaceholder;
          }
        } else {
          input.placeholder = originalPlaceholder;
        }
      }
    }

    function resolveNearest(lat, lon, input, isPickup, originalPlaceholder) {
      let minDistance = Infinity, nearest = null;
      for (const stopName in STOP_COORDS) {
        const coords = STOP_COORDS[stopName];
        const dist = haversine(parseFloat(lat), parseFloat(lon), coords.lat, coords.lon);
        if (dist < minDistance) { minDistance = dist; nearest = stopName; }
      }
      if (nearest && minDistance < 3) {
        const stopObj = STOPS.find(s => s.n.toLowerCase() === nearest);
        input.value = stopObj.n;
        if (isPickup) pickupStop = stopObj; else dropStop = stopObj;
      } else {
        alert("No PMPML stop found within 3km of this location.");
      }
      input.placeholder = originalPlaceholder;
    }

    function hl(text, q) {
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(re, '<mark style="background:rgba(0,212,255,0.2);color:inherit;border-radius:2px">$1</mark>');
    }

    function swapStops() {
      const p = document.getElementById('pickup-input'), d = document.getElementById('drop-input');
      const pVal = p.value, dVal = d.value;
      p.value = dVal; d.value = pVal;
      const temp = pickupStop; pickupStop = dropStop; dropStop = temp;
    }
    function stripDir(name) { return name.replace(/(?:UP|DOWN)$/i, '').trim(); }

    // ── Core Logic ────────────────────────────────────────────────────────────────
    const STOP_COORDS = {};
    // Extract coordinates from massive ROUTES object once at startup
    (function buildCoordMap() {
      for (const rid in ROUTES) {
        for (const stop of ROUTES[rid].s) {
          if (stop.lat && stop.lon) {
            STOP_COORDS[stop.n.toLowerCase()] = { lat: stop.lat, lon: stop.lon };
          }
        }
      }
    })();

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    async function resolveToStop(input) {
      let cleanInput = input.trim().toLowerCase();

      // Strip common suffixes
      const suffixes = ["metro station", "bus stop", "station", "stop", "pmpml stop"];
      suffixes.forEach(s => {
        if (cleanInput.endsWith(s)) {
          cleanInput = cleanInput.substring(0, cleanInput.length - s.length).trim();
        }
      });

      // 1. Exact match
      const existingStop = STOPS.find(s => s.n.toLowerCase() === cleanInput);
      if (existingStop) return existingStop.n;

      // 2. Fuzzy match fallback
      const knownStops = STOPS.filter(s => s.n.length > 3).sort((a, b) => b.n.length - a.n.length);
      const fuzzy = knownStops.find(s => cleanInput.includes(s.n.toLowerCase()) || s.n.toLowerCase().includes(cleanInput));
      if (fuzzy) return fuzzy.n;

      // 3. Mappls Geocoding fallback
      return new Promise((resolve) => {
        if (typeof mappls === 'undefined') { resolve(null); return; }
        mappls.search(cleanInput + ", Pune", { region: 'pune' }, (data) => {
          if (data && data.suggestedLocations && data.suggestedLocations.length > 0) {
            const loc = data.suggestedLocations[0];
            const lat = loc.latitude || loc.lat;
            const lon = loc.longitude || loc.lng;
            if (lat && lon) {
              let minDistance = Infinity, nearest = null;
              for (const stopName in STOP_COORDS) {
                const coords = STOP_COORDS[stopName];
                const dist = haversine(parseFloat(lat), parseFloat(lon), coords.lat, coords.lon);
                if (dist < minDistance) { minDistance = dist; nearest = stopName; }
              }
              if (nearest && minDistance < 3) {
                const stopObj = STOPS.find(s => s.n.toLowerCase() === nearest);
                resolve(stopObj ? stopObj.n : null);
                return;
              }
            }
          }
          resolve(null);
        });
      });
    }

    async function handleLocationAction(inputId, isPickup) {
      const btn = event.currentTarget;
      const input = document.getElementById(inputId);
      const val = input.value.trim();
      const original = btn.textContent;
      btn.textContent = '⌛';

      if (val) {
        const resolved = await resolveToStop(val);
        btn.textContent = original;
        if (resolved) {
          input.value = resolved;
          const stopObj = STOPS.find(s => s.n.toLowerCase() === resolved.toLowerCase());
          if (isPickup) pickupStop = stopObj; else dropStop = stopObj;
        } else {
          alert("Could not find a PMPML stop near: " + val);
        }
        return;
      }

      if (!navigator.geolocation) { alert("Geolocation not supported"); btn.textContent = original; return; }
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        let minDistance = Infinity, nearest = null;
        for (const stopName in STOP_COORDS) {
          const coords = STOP_COORDS[stopName];
          const dist = haversine(latitude, longitude, coords.lat, coords.lon);
          if (dist < minDistance) { minDistance = dist; nearest = stopName; }
        }
        btn.textContent = original;
        if (nearest) {
          const stopObj = STOPS.find(s => s.n.toLowerCase() === nearest);
          input.value = stopObj.n;
          if (isPickup) pickupStop = stopObj; else dropStop = stopObj;
        }
      }, () => { alert("Location access denied"); btn.textContent = original; });
    }


    setupAutocomplete('pickup-input', 'pickup-dropdown', true);
    setupAutocomplete('drop-input', 'drop-dropdown', false);

    let currentSearchQuery = "";

    function onQuickSearch(val) {
      currentSearchQuery = val.toLowerCase().trim();
      refreshCurrentResults();
    }

    function refreshCurrentResults() {
      if (currentTab === 'direct') {
        let filtered = allDirect;
        if (currentSearchQuery) {
          filtered = allDirect.filter(r => stripDir(r.id).toLowerCase().includes(currentSearchQuery));
        }
        renderDirect(filtered);
      } else {
        let filtered = allTransfers;
        if (currentSearchQuery) {
          filtered = allTransfers.filter(r =>
            stripDir(r.r1).toLowerCase().includes(currentSearchQuery) ||
            stripDir(r.r2).toLowerCase().includes(currentSearchQuery)
          );
        }
        renderTransfers(filtered);
      }
    }

    // ── Search ────────────────────────────────────────────────────────────────────
    async function searchRoutes() {
      const qs = document.getElementById('quick-bus-search');
      if (qs) { qs.value = ''; currentSearchQuery = ''; }
      const pInput = document.getElementById('pickup-input');
      const dInput = document.getElementById('drop-input');
      let pVal = pInput.value.trim();
      let dVal = dInput.value.trim();

      if (!pVal || !dVal) { alert('Please enter both pickup and drop stops.'); return; }

      // Auto-resolve landmarks if they are not exact stops
      const searchBtn = document.querySelector('.search-btn');
      const originalBtnText = searchBtn.innerHTML;
      searchBtn.innerHTML = '⌛ Resolving Stops...';
      searchBtn.disabled = true;

      const resolvedP = await resolveToStop(pVal);
      if (resolvedP) { pVal = resolvedP; pInput.value = pVal; }
      const resolvedD = await resolveToStop(dVal);
      if (resolvedD) { dVal = resolvedD; dInput.value = dVal; }

      searchBtn.innerHTML = originalBtnText;
      searchBtn.disabled = false;

      if (pVal.toLowerCase() === dVal.toLowerCase()) { alert('Pickup and drop cannot be the same.'); return; }

      const pKey = pVal.toLowerCase();
      const dKey = dVal.toLowerCase();

      // Direct routes
      allDirect = [];
      for (const rid of Object.keys(ROUTES)) {
        const route = ROUTES[rid];
        const stops = route.s;
        let pIdx = -1, dIdx = -1;
        for (let i = 0; i < stops.length; i++) {
          const n = stops[i].n.toLowerCase();
          if (pIdx === -1 && n === pKey) { pIdx = i; continue; }
          if (pIdx !== -1 && n === dKey) { dIdx = i; break; }
        }
        if (pIdx === -1 || dIdx === -1) continue;
        const segment = stops.slice(pIdx, dIdx + 1);
        allDirect.push({ id: rid, ln: route.ln, dir: route.dir, sch: route.sch || [], segment, stops: segment.length });
      }
      allDirect.sort((a, b) => a.stops - b.stops);

      // Transfer routes (1 change)
      allTransfers = findTransfers(pKey, dKey);

      // Render
      const section = document.getElementById('results-section');
      section.style.display = 'block';
      setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);

      document.getElementById('direct-count').textContent = `(${allDirect.length})`;
      document.getElementById('transfer-count').textContent = `(${allTransfers.length})`;
      document.getElementById('results-title').textContent = `${pVal} → ${dVal}`;

      // Auto-switch to transfer tab if no direct
      if (allDirect.length === 0 && allTransfers.length > 0) {
        switchTab('transfer');
      } else {
        switchTab('direct');
      }
    }

    function findTransfers(pKey, dKey, maxResults = 25) {
      // Build fast lookup: which routes serve pickup and drop
      const rFromP = {}, rToD = {};
      for (const rid of Object.keys(ROUTES)) {
        const sidx = ROUTE_STOP_IDX[rid];
        if (pKey in sidx) rFromP[rid] = sidx[pKey];
        if (dKey in sidx) rToD[rid] = sidx[dKey];
      }

      const best = {}; // key: "r1|r2" -> best interchange
      for (const [r1, pIdx] of Object.entries(rFromP)) {
        const stops1 = ROUTES[r1].s;
        for (let xi = pIdx + 1; xi < stops1.length; xi++) {
          const xName = stops1[xi].n.toLowerCase();
          for (const [r2, dIdx] of Object.entries(rToD)) {
            if (r1 === r2) continue;
            const sidx2 = ROUTE_STOP_IDX[r2];
            if (!(xName in sidx2)) continue;
            const xi2 = sidx2[xName];
            if (xi2 >= dIdx) continue;
            const total = (xi - pIdx) + (dIdx - xi2);
            const key = r1 + '|' + r2;
            if (!(key in best) || total < best[key].total) {
              best[key] = {
                r1, r2,
                xferName: stops1[xi].n,
                seg1: ROUTES[r1].s.slice(pIdx, xi + 1),
                seg2: ROUTES[r2].s.slice(xi2, dIdx + 1),
                stops1: xi - pIdx + 1, stops2: dIdx - xi2 + 1,
                total
              };
            }
          }
        }
      }

      return Object.values(best)
        .sort((a, b) => a.total - b.total)
        .slice(0, maxResults);
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────────
    function switchTab(tab) {
      const qs = document.getElementById('quick-bus-search');
      if (qs) { qs.value = ''; currentSearchQuery = ''; }
      currentTab = tab;
      document.getElementById('tab-direct-btn').classList.toggle('active', tab === 'direct');
      document.getElementById('tab-transfer-btn').classList.toggle('active', tab === 'transfer');

      const fr = document.getElementById('filter-row');
      const rc = document.getElementById('route-count');

      if (tab === 'direct') {
        rc.textContent = allDirect.length ? `${allDirect.length} route${allDirect.length !== 1 ? 's' : ''}` : '';
        fr.innerHTML = allDirect.length > 1 ? `
      <button class="filter-btn active" onclick="applyDirectFilter('all',this)">All</button>
      <button class="filter-btn" onclick="applyDirectFilter('up',this)">UP only</button>
      <button class="filter-btn" onclick="applyDirectFilter('down',this)">DOWN only</button>
      <button class="filter-btn" onclick="applyDirectFilter('fewest',this)">Fewest stops</button>` : '';
        renderDirect(allDirect);
      } else {
        rc.textContent = allTransfers.length ? `${allTransfers.length} option${allTransfers.length !== 1 ? 's' : ''}` : '';
        fr.innerHTML = allTransfers.length > 1 ? `
      <button class="filter-btn active" onclick="applyXferFilter('all',this)">All</button>
      <button class="filter-btn" onclick="applyXferFilter('fewest',this)">Fewest stops</button>` : '';
        renderTransfers(allTransfers);
      }
    }

    // ── Render Direct ─────────────────────────────────────────────────────────────
    function getDest(ln) {
      const m = ln && ln.match(/towards (.+)$/i);
      return m ? m[1].trim() : 'Other';
    }

    function renderDirect(results) {
      const list = document.getElementById('results-list');
      if (!results.length) {
        list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🚫</div>
      <div class="empty-title">No Direct Routes</div>
      <div class="empty-sub">No bus goes directly between these stops.<br>Check the "With 1 Change" tab for transfer options.</div>
    </div>`; return;
      }

      list.innerHTML = results.map((r, i) => {
        const isDown = r.dir === 0;
        const schHtml = r.sch.length ? `
      <div class="schedule-label">First buses</div>
      <div class="schedule-row">${r.sch.slice(0, 10).map(t => `<span class="schedule-chip">${t}</span>`).join('')}</div>` : '';
        const stopsHtml = r.segment.map((s, idx) => {
          let cls = 'stop-item';
          if (idx === 0) cls += ' hl-p';
          else if (idx === r.segment.length - 1) cls += ' hl-d';
          return `<div class="${cls}">${s.n}</div>`;
        }).join('');
        return `<div class="route-card${isDown ? ' dir-down' : ''}" onclick="toggleCard(this)" style="animation-delay:${i * 0.03}s">
      <div class="route-header">
        <div class="route-badge">${stripDir(r.id)}</div>
        <div class="route-info">
          <div class="route-long-name">${r.ln || r.id}</div>
          <div class="route-meta">${r.stops} stops in segment</div>
        </div>
        <span class="dir-pill ${isDown ? 'down' : 'up'}">${isDown ? 'DOWN' : 'UP'}</span>
        <span class="expand-icon">▼</span>
      </div>
      <div class="route-body">${schHtml}<div class="stops-timeline">${stopsHtml}</div></div>
    </div>`;
      }).join('');
    }

    // ── Render Transfers ──────────────────────────────────────────────────────────
    function renderTransfers(results) {
      const list = document.getElementById('results-list');
      if (!results.length) {
        list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔄</div>
      <div class="empty-title">No Transfer Routes Found</div>
      <div class="empty-sub">Could not find any 1-change route between these stops.</div>
    </div>`; return;
      }

      // Group by interchange stop
      const groups = {};
      for (const r of results) {
        const key = r.xferName;
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
      }
      const sortedGroups = Object.entries(groups).sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));

      let globalIdx = 0;
      list.innerHTML = sortedGroups.map(([dest, xfers]) => {
        const cardsHtml = xfers.map((r) => {
          const i = globalIdx++;
          const seg1Html = r.seg1.map((s, idx) => {
            let cls = 'stop-item';
            if (idx === 0) cls += ' hl-p';
            else if (idx === r.seg1.length - 1) cls += ' hl-x';
            return `<div class="${cls}">${s.n}</div>`;
          }).join('');
          const seg2Html = r.seg2.map((s, idx) => {
            let cls = 'stop-item';
            if (idx === 0) cls += ' hl-x';
            else if (idx === r.seg2.length - 1) cls += ' hl-d';
            return `<div class="${cls}">${s.n}</div>`;
          }).join('');
          return `<div class="xfer-card" onclick="toggleCard(this)" style="animation-delay:${i * 0.03}s">
        <div class="xfer-header">
          <div class="xfer-badges">
            <span class="xfer-badge">${stripDir(r.r1)}</span>
            <span class="xfer-arrow">→</span>
            <span class="xfer-badge">${stripDir(r.r2)}</span>
          </div>
          <div class="xfer-info">
            <div class="xfer-title">Change at ${r.xferName}</div>
            <div class="xfer-meta">${r.stops1 - 1} + ${r.stops2 - 1} stops &nbsp;·&nbsp; total ${r.total} stops</div>
          </div>
          <span class="xfer-pill">1 change</span>
          <span class="expand-icon">▼</span>
        </div>
        <div class="xfer-body">
          <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:8px;">
            🚌 Bus ${stripDir(r.r1)} &nbsp;·&nbsp; ${ROUTES[r.r1].ln || r.r1}
          </div>
          <div class="stops-timeline">${seg1Html}</div>
          <div class="interchange-marker">
            <span class="i-icon">🔄</span>
            Change to Bus ${stripDir(r.r2)} here
          </div>
          <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:8px;">
            🚌 Bus ${stripDir(r.r2)} &nbsp;·&nbsp; ${ROUTES[r.r2].ln || r.r2}
          </div>
          <div class="stops-timeline">${seg2Html}</div>
        </div>
      </div>`;
        }).join('');
        return `<div class="dest-group">
      <div class="dest-header">
        <span class="dest-label">🔄 Change at ${dest}</span>
        <span class="dest-count">${xfers.length} option${xfers.length !== 1 ? 's' : ''}</span>
      </div>
      ${cardsHtml}
    </div>`;
      }).join('');
    }

    function toggleCard(card) { card.classList.toggle('open'); }

    function applyDirectFilter(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      let f = allDirect;
      if (type === 'up') f = allDirect.filter(r => r.dir === 1);
      else if (type === 'down') f = allDirect.filter(r => r.dir === 0);
      else if (type === 'fewest') f = [...allDirect].sort((a, b) => a.stops - b.stops);
      renderDirect(f);
    }

    function applyXferFilter(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      let f = allTransfers;
      if (type === 'fewest') f = [...allTransfers].sort((a, b) => a.total - b.total);
      renderTransfers(f);
    }
  </script>
</body>
